{% extends "base.html" %}
{% block content %}
<h1>Thank you!</h1>
<p>Your participant code: <span class="pill">{{ participant_code }}</span></p>
{% if exported %}
<p class="muted">The data has been saved to <b>data.csv</b>.</p>
{% else %}
<p class="muted">Export was not completed yet. Please contact the researcher.</p>
{% endif %}
<p><a class="link" href="{{ url_for('home') }}">Return to main menu</a></p>
{% endblock %}
