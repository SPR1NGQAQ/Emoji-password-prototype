{% extends "base.html" %}
{% block content %}
<h1>Choose recall order</h1>
<p class="muted">For D2 recall, choose which one to re-enter first.</p>
{% if error %}<p class="error">{{ error }}</p>{% endif %}
<form method="post">
  <label>
    <input type="radio" name="order" value="A_first" />
    Start with traditional password, then emoji password
  </label>
  <label>
    <input type="radio" name="order" value="B_first" />
    Start with emoji password, then traditional password
  </label>
  <button type="submit">Continue</button>
</form>
{% endblock %}
