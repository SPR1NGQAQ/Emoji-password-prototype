{% extends "base.html" %}
{% block content %}
<h1>Participant information</h1>
<p class="muted">Please fill this before choosing A/B order. This is used to contact/verify 48h recall.</p>
{% if error %}<p class="error">{{ error }}</p>{% endif %}

<form method="post">
  <label>Name or alias</label>
  <input type="text" name="display_name" autocomplete="off" required />

  <label>Contact (email / phone / student ID)</label>
  <input type="text" name="contact" autocomplete="off" required />

  <label>Note (optional)</label>
  <textarea name="note" rows="3" placeholder="Any scheduling note for recall"></textarea>

  <button type="submit">Continue</button>
</form>
{% endblock %}
