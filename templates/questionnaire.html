{% extends "base.html" %}
{% block content %}
<h1>Post-recall questionnaire</h1>
<p class="muted">Scale: 1 (strongly disagree) … 7 (strongly agree)</p>
{% if error %}<p class="error">{{ error }}</p>{% endif %}

<form method="post" id="qForm">

  <label>Which structure best describes your emoji password?</label>
  <select name="emoji_form_self" id="emoji_form_self" required>
    <option value="">Choose</option>
    <option value="emoji_only">Pure emojis only</option>
    <option value="mixed">Emojis + letters/numbers (mixed)</option>
  </select>

  <hr style="margin:18px 0;border:none;border-top:1px solid #eee;">

  <label>Traditional password felt easy to use.</label>
  <select name="ease_a" required>
    <option value="">Choose</option>
    {% for i in range(1,8) %}<option value="{{i}}">{{i}}</option>{% endfor %}
  </select>

  <label>Emoji password felt easy to use.</label>
  <select name="ease_b" required>
    <option value="">Choose</option>
    {% for i in range(1,8) %}<option value="{{i}}">{{i}}</option>{% endfor %}
  </select>

  <label>Traditional password felt secure.</label>
  <select name="secure_a" required>
    <option value="">Choose</option>
    {% for i in range(1,8) %}<option value="{{i}}">{{i}}</option>{% endfor %}
  </select>

  <label>Emoji password felt secure.</label>
  <select name="secure_b" required>
    <option value="">Choose</option>
    {% for i in range(1,8) %}<option value="{{i}}">{{i}}</option>{% endfor %}
  </select>

  <label>I could recall my traditional password after ~48 hours.</label>
  <select name="recall_confidence_a" required>
    <option value="">Choose</option>
    {% for i in range(1,8) %}<option value="{{i}}">{{i}}</option>{% endfor %}
  </select>

  <label>I could recall my emoji password after ~48 hours.</label>
  <select name="recall_confidence_b" required>
    <option value="">Choose</option>
    {% for i in range(1,8) %}<option value="{{i}}">{{i}}</option>{% endfor %}
  </select>

  <label>The emoji password required more mental effort than the traditional password.</label>
  <select name="effort_b" required>
    <option value="">Choose</option>
    {% for i in range(1,8) %}<option value="{{i}}">{{i}}</option>{% endfor %}
  </select>

  <label>Overall preference: 1 = strongly prefer traditional password, 7 = strongly prefer emoji password</label>
  <select name="prefer" required>
    <option value="">Choose</option>
    {% for i in range(1,8) %}<option value="{{i}}">{{i}}</option>{% endfor %}
  </select>

  <label>I would be willing to use emoji passwords in real life.</label>
  <select name="willing" required>
    <option value="">Choose</option>
    {% for i in range(1,8) %}<option value="{{i}}">{{i}}</option>{% endfor %}
  </select>

  <hr style="margin:18px 0;border:none;border-top:1px solid #eee;">

  <label>How did you choose emojis in emoji password?</label>
  <select name="strategy_b" required>
    <option value="">Choose</option>
    <option value="random">Random</option>
    <option value="meaning">Based on meaning</option>
    <option value="pattern">Pattern / sequence</option>
    <option value="easy">Easy to remember</option>
    <option value="first">Picked the first emoji(s)</option>
  </select>

  <label>My emojis were chosen to relate to the meaning of my password.</label>
  <select name="semantic_b" required>
    <option value="">Choose</option>
    {% for i in range(1,8) %}<option value="{{i}}">{{i}}</option>{% endfor %}
  </select>

  <div id="branch_emoji_only" style="display:none;">
    <label>What was hardest in recalling the emoji-only password?</label>
    <select name="emoji_only_hardest" id="emoji_only_hardest">
      <option value="">Choose</option>
      <option value="order">Remembering the sequence/order</option>
      <option value="similar">Emojis look similar / confusion</option>
      <option value="recognition">Could not recognize the same emojis clearly</option>
      <option value="not_hard">Not difficult</option>
      <option value="other">Other</option>
    </select>

    <label>If you made a mistake, what kind was it most often?</label>
    <select name="emoji_only_mistake" id="emoji_only_mistake">
      <option value="">Choose</option>
      <option value="wrong_emoji">Chose a different emoji</option>
      <option value="wrong_order">Correct emojis but wrong order</option>
      <option value="missing_extra">Missing or extra emoji(s)</option>
      <option value="not_sure">Not sure / did not notice</option>
      <option value="no_mistake">I did not make mistakes</option>
    </select>
  </div>

  <div id="branch_mixed" style="display:none;">
    <label>Which part was hardest to recall in the mixed password?</label>
    <select name="mixed_hardest_part" id="mixed_hardest_part">
      <option value="">Choose</option>
      <option value="emoji_part">The emojis</option>
      <option value="text_part">The letters/text part</option>
      <option value="number_part">The numbers part</option>
      <option value="combination">The order/combination of parts</option>
      <option value="not_hard">Not difficult</option>
    </select>

    <label>What best describes your mixed password style?</label>
    <select name="mixed_style" id="mixed_style">
      <option value="">Choose</option>
      <option value="text_emoji">Text + emojis</option>
      <option value="number_emoji">Numbers + emojis</option>
      <option value="text_number_emoji">Text + numbers + emojis</option>
    </select>
  </div>

  <hr style="margin:18px 0;border:none;border-top:1px solid #eee;">

  <label>Any comments? (optional)</label>
  <textarea name="comment" rows="4" placeholder="What was confusing / enjoyable / annoying?"></textarea>

  <button type="submit">Submit</button>
</form>

<script>
  function setRequired(el, required) {
    if (!el) return;
    el.required = !!required;
  }

  function updateBranch() {
    const formType = document.getElementById("emoji_form_self").value;

    const pureBlock = document.getElementById("branch_emoji_only");
    const mixedBlock = document.getElementById("branch_mixed");

    const pureHardest = document.getElementById("emoji_only_hardest");
    const pureMistake = document.getElementById("emoji_only_mistake");

    const mixedHardest = document.getElementById("mixed_hardest_part");
    const mixedStyle = document.getElementById("mixed_style");

    if (formType === "emoji_only") {
      pureBlock.style.display = "block";
      mixedBlock.style.display = "none";

      setRequired(pureHardest, true);
      setRequired(pureMistake, true);

      setRequired(mixedHardest, false);
      setRequired(mixedStyle, false);

      if (mixedHardest) mixedHardest.value = "";
      if (mixedStyle) mixedStyle.value = "";
    } else if (formType === "mixed") {
      pureBlock.style.display = "none";
      mixedBlock.style.display = "block";

      setRequired(pureHardest, false);
      setRequired(pureMistake, false);

      setRequired(mixedHardest, true);
      setRequired(mixedStyle, true);

      if (pureHardest) pureHardest.value = "";
      if (pureMistake) pureMistake.value = "";
    } else {
      pureBlock.style.display = "none";
      mixedBlock.style.display = "none";

      setRequired(pureHardest, false);
      setRequired(pureMistake, false);
      setRequired(mixedHardest, false);
      setRequired(mixedStyle, false);
    }
  }

  document.getElementById("emoji_form_self").addEventListener("change", updateBranch);
  updateBranch();
</script>
{% endblock %}
